- name: Import Java Common Role
  ansible.builtin.include_role:
    name: common
    tasks_from: java

- name: Install MySQL Client
  ansible.builtin.dnf:
    name:
      - mysql
      - python3-PyMySQL
    state: installed

- name: Load Schema
  community.mysql.mysql_db:
    state: import
    name: all
    target: /app/db/{{ item }}.sql
    login_host: mysql-{{ ENV }}.azdevopsb82.online
    login_user: root
    login_password: RoboShop@1
    loop:
      - schema
      - app-user
      - master-data

- name: Open port 8080 in firewall
  ansible.posix.firewalld:
    port: 8080/tcp
    permanent: true
    state: enabled
    immediate: yes

- name: Reload firewalld
  ansible.builtin.command: firewall-cmd --reload


