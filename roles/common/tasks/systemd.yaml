- name: Setup systemD service file
  ansible.builtin.copy:
    src: "{{ app_name }}.service"
    dsst: /etc/systemd/system/{{ app_name }}.service

- name: Start Application
  ansible.builtin.systemd_service:
    name: "{{ app_name }}"
    state: restarted
    enabled: true
    daemon_reload: true