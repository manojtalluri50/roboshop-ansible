- name: Install Python
  ansible.builtin.dnf:
    name:
      - python3
      - gcc
      - python3-devel
    state: installed

- name: Import App Prerequisites
  ansible.builtin.include_tasks:
    file: app-prereq.yaml

- name: Install Python Dependencies
  ansible.builtin.pip:
    requirements: /app/requirements.txt

- name: SystemD Service setup
  ansible.builtin.include_tasks:
    file: systemd.yaml