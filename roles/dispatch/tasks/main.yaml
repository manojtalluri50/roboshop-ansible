- name: Copy the Dispatch Service File
  ansible.builtin.template:
    src: "{{ app_name }}.service"
    dest: "/etc/systemd/system/{{ app_name }}.service"

- name: Install Golang
  ansible.builtin.dnf:
    name: golang
    state: installed

- name: Create roboshop user
  ansible.builtin.user:
    name: roboshop

- name: Create app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: Download and extract dispatch code
  ansible.builtin.unarchive:
    src: https://roboshop-artifacts.s3.amazonaws.com/{{ app_name }}-v3.zip
    dest: /app
    remote_src: yes

- name: Initialize Go module
  ansible.builtin.command: go mod init {{ app_name }}
  args:
    chdir: /app
  ignore_errors: true

- name: Download dependencies
  ansible.builtin.command: go get
  args:
    chdir: /app

- name: Build application
  ansible.builtin.command: go build
  args:
    chdir: /app

- name: Start dispatch service
  ansible.builtin.systemd_service:
    name: dispatch
    state: restarted
    enabled: yes
    daemon_reload: true